name: Deploy MiRemix MRP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'miremix-mrp/**'
      - '.github/workflows/deploy-miremix-mrp.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: miremix-mrp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: miremix-mrp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_CRM_APP_URL: https://foodcrm-pro-1015963821956.us-west1.run.app/
          VITE_CRM_FIRESTORE_DATABASE_ID: ai-studio-af887f16-decc-48d2-b6b7-47c85e2eed76
          VITE_CRM_SHARED_ORG_ID: org_40centurygrain_shared
          VITE_CRM_ORDERS_COLLECTION: orders
          VITE_MIREMIX_FIRESTORE_DATABASE_ID: ai-studio-eb8d88f4-51e8-4643-b410-dd1062becfc3
        run: npm run build

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project "gen-lang-client-0021754998"
