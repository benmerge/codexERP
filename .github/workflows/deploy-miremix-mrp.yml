name: Deploy MiRemix MRP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'miremix-mrp/**'
      - '.github/workflows/deploy-miremix-mrp.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: miremix-mrp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Load platform env
        run: node ../scripts/export-platform-env.mjs miremix-mrp >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: miremix-mrp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Authenticate to Firebase
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting --project "$FIREBASE_PROJECT_ID"
