name: Deploy MiRemix MRP

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'miremix-mrp/**'
      - '.github/workflows/deploy-miremix-mrp.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miremix-mrp
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: miremix-mrp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > "$RUNNER_TEMP/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-service-account.json"
          npx firebase-tools deploy --only hosting --project "gen-lang-client-0021754998"
