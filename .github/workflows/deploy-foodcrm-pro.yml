name: Deploy FoodCRM Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'foodcrm-pro/**'
      - '.github/workflows/deploy-foodcrm-pro.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: foodcrm-pro
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy foodcrm-pro --source . --region "us-west1" --project "gen-lang-client-0021754998" --allow-unauthenticated
