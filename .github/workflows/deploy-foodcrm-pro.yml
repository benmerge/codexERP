name: Deploy FoodCRM Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'foodcrm-pro/**'
      - '.github/workflows/deploy-foodcrm-pro.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: foodcrm-pro
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Load platform env
        run: node ../scripts/export-platform-env.mjs foodcrm-pro >> "$GITHUB_ENV"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" --source . --region "$CLOUD_RUN_REGION" --project "$FIREBASE_PROJECT_ID" --allow-unauthenticated --set-build-env-vars "VITE_FIREBASE_API_KEY=$VITE_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN=$VITE_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID=$VITE_FIREBASE_PROJECT_ID,VITE_FIREBASE_APP_ID=$VITE_FIREBASE_APP_ID,VITE_FIREBASE_STORAGE_BUCKET=$VITE_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID=$VITE_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_MEASUREMENT_ID=$VITE_FIREBASE_MEASUREMENT_ID,VITE_FIREBASE_DATABASE_ID=$VITE_FIREBASE_DATABASE_ID,VITE_SHARED_ORG_ID=$VITE_SHARED_ORG_ID,VITE_MIREMIX_FIRESTORE_DATABASE_ID=$VITE_MIREMIX_FIRESTORE_DATABASE_ID,VITE_MIREMIX_APP_URL=$VITE_MIREMIX_APP_URL"
