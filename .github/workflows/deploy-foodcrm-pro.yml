name: Deploy FoodCRM Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'foodcrm-pro/**'
      - '.github/workflows/deploy-foodcrm-pro.yml'
      - '.nvmrc'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: foodcrm-pro
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy foodcrm-pro --source . --region "us-west1" --project "gen-lang-client-0021754998" --allow-unauthenticated --set-build-env-vars "VITE_FIREBASE_API_KEY=AIzaSyDaFqitHD81GHEdUlKkvVG68r_POj5hJLg,VITE_FIREBASE_AUTH_DOMAIN=gen-lang-client-0021754998.firebaseapp.com,VITE_FIREBASE_PROJECT_ID=gen-lang-client-0021754998,VITE_FIREBASE_APP_ID=1:1015963821956:web:8554aaf0bf511befbf1fd1,VITE_FIREBASE_STORAGE_BUCKET=gen-lang-client-0021754998.firebasestorage.app,VITE_FIREBASE_MESSAGING_SENDER_ID=1015963821956,VITE_FIREBASE_MEASUREMENT_ID=,VITE_FIREBASE_DATABASE_ID=ai-studio-af887f16-decc-48d2-b6b7-47c85e2eed76,VITE_SHARED_ORG_ID=org_40centurygrain_shared,VITE_MIREMIX_FIRESTORE_DATABASE_ID=ai-studio-eb8d88f4-51e8-4643-b410-dd1062becfc3,VITE_MIREMIX_APP_URL=https://gen-lang-client-0021754998.web.app/"
